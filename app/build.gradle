plugins {
    id 'com.android.application'
    id 'com.google.devtools.ksp'
    id 'kotlin-parcelize'
    id 'org.jetbrains.kotlin.plugin.compose'
}

android {
    compileSdkVersion 36
    defaultConfig {
        applicationId "com.samsung.android.scan3d"
        minSdkVersion 33
        targetSdkVersion 36
        versionCode 4
        versionName "1.2.0"
    }

    compileOptions {
        sourceCompatibility rootProject.ext.java_version
        targetCompatibility rootProject.ext.java_version
    }

    kotlin {
        jvmToolchain {
            languageVersion.set(JavaLanguageVersion.of(rootProject.ext.java_version.majorVersion))
        }
    }

    composeOptions {
        kotlinCompilerExtensionVersion = "2.0.0"
    }

    buildTypes {
        release {
            debuggable false
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig = signingConfigs.debug
        }
    }
    packagingOptions {
        exclude("META-INF/INDEX.LIST")
        exclude("META-INF/io.netty.versions.properties")
    }
    buildFeatures {
        compose = true
        buildConfig = true
    }
    namespace = 'com.samsung.android.scan3d'
}

dependencies {
    def core_ktx_version = "1.17.0"
    def lifecycle_version = "2.8.3"
    def ktor_version = "2.3.12"
    def material_version = "1.13.0"
    def compose_bom_version = "2024.06.00"

